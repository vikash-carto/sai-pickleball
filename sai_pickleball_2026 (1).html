<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAI Pickleball Tournament 2026 – Live Scores</title>
<style>
:root{--bg:#04080f;--surface:#0d1525;--card:#111d35;--border:rgba(255,255,255,0.09);--accent:#c8e600;--text:#e8eaf0;--muted:rgba(255,255,255,0.45);--green:#22c55e;--red:#ef4444;--orange:#ff6b35;--purple:#a855f7}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

.header{background:linear-gradient(135deg,#060e20 0%,#0f0a28 60%,#061a10 100%);border-bottom:3px solid var(--accent);padding:16px 16px 12px;text-align:center}
.header-org{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:3px}
.header-title{font-size:24px;font-weight:900;letter-spacing:2px;text-transform:uppercase;line-height:1.1}
.header-title span{color:var(--accent)}
.header-sub{font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:3px}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:#ef4444;letter-spacing:1px;margin-top:7px}
.live-dot{width:6px;height:6px;background:#ef4444;border-radius:50%;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}

.admin-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.admin-bar label{font-size:11px;color:var(--muted)}
.admin-bar input{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 9px;color:var(--text);font-size:13px;width:140px}
.btn{padding:6px 14px;border-radius:6px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.5px}
.btn-accent{background:var(--accent);color:#000}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-green{background:var(--green);color:#000}
.btn-red{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.admin-status{margin-left:auto;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600}
.admin-status.on{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.admin-status.off{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}

.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:10px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.content{max-width:700px;margin:0 auto;padding:12px}

.day-block{margin-bottom:20px}
.day-header{background:linear-gradient(90deg,rgba(200,230,0,.12),transparent);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:8px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.day-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.day-date{font-size:11px;color:var(--accent);font-weight:700}
.day-time{font-size:10px;color:var(--muted)}

.section-divider{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--purple);text-align:center;padding:6px 0;margin:8px 0;border-top:1px solid rgba(168,85,247,.2);border-bottom:1px solid rgba(168,85,247,.2)}

.match-card{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:7px;overflow:hidden}
.match-card.stage-qf{border-left:3px solid var(--purple)}
.match-card.stage-sf{border-left:3px solid var(--orange)}
.match-card.stage-final{border-left:3px solid var(--accent);background:rgba(200,230,0,.04)}
.match-card.status-live{border-color:rgba(239,68,68,.5)}
.match-card.status-done{border-color:rgba(34,197,94,.25)}

.match-main{padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:default}
.match-time-label{display:flex;flex-direction:column;align-items:center;min-width:42px}
.match-time{font-size:9px;color:var(--muted);line-height:1.3;text-align:center}
.match-stage-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.badge-group{background:rgba(59,143,255,.15);color:#3b8fff}
.badge-qf{background:rgba(168,85,247,.15);color:var(--purple)}
.badge-sf{background:rgba(255,107,53,.15);color:var(--orange)}
.badge-final{background:rgba(200,230,0,.15);color:var(--accent)}
.badge-3rd{background:rgba(255,255,255,.08);color:var(--muted)}

.match-body{flex:1;min-width:0}
.match-teams-row{display:flex;align-items:center;gap:6px}
.match-team{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.match-team.right{text-align:right}
.match-team.winner{color:var(--accent)}
.match-score-box{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:5px;padding:3px 8px;flex-shrink:0}
.score-num{font-size:15px;font-weight:800;min-width:18px;text-align:center}
.score-dash{font-size:11px;color:var(--muted)}
.match-group-label{font-size:9px;color:var(--muted);margin-top:2px}

.match-status-row{display:flex;align-items:center;justify-content:space-between;margin-top:5px}
.status-pill{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:3px;text-transform:uppercase}
.pill-pending{background:rgba(255,255,255,.05);color:var(--muted)}
.pill-live{background:rgba(239,68,68,.15);color:#ef4444;animation:pulse 1.5s infinite}
.pill-done{background:rgba(34,197,94,.12);color:var(--green)}
.court-label{font-size:9px;color:var(--muted)}

.edit-panel{display:none;padding:8px 12px;background:rgba(200,230,0,.04);border-top:1px solid rgba(200,230,0,.12)}
.edit-panel.open{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.edit-panel label{font-size:11px;color:var(--muted)}
.score-inp{width:52px;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:5px 6px;color:var(--text);font-size:14px;font-weight:700;text-align:center}
.status-sel{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-size:11px}

/* STANDINGS */
.standings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.group-card-header{padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
.group-card-name{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.standings-tbl{width:100%;border-collapse:collapse}
.standings-tbl th{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:3px 10px;background:rgba(255,255,255,.02);text-align:left}
.standings-tbl th:not(:nth-child(2)){text-align:center}
.standings-tbl td{padding:6px 10px;font-size:11px;border-top:1px solid var(--border)}
.standings-tbl td:not(:nth-child(2)){text-align:center}
.q-row td:first-child{border-left:2px solid var(--accent)}
.pts-val{font-weight:800;color:var(--accent)}

/* BRACKET */
.bracket-outer{overflow-x:auto;padding-bottom:8px}
.bracket-flex{display:flex;gap:0;min-width:500px}
.bracket-col{flex:1;padding:0 6px}
.bracket-col-hdr{text-align:center;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:14px}
.b-match{background:var(--card);border:1px solid var(--border);border-radius:7px;margin-bottom:10px;overflow:hidden}
.b-team{padding:7px 10px;display:flex;justify-content:space-between;align-items:center;font-size:12px}
.b-team:first-child{border-bottom:1px solid var(--border)}
.b-team.w{background:rgba(200,230,0,.07)}
.b-team-name{font-weight:600}
.b-score{font-weight:800;font-size:14px;color:var(--accent)}
.b-lbl{font-size:9px;color:var(--muted);text-align:center;padding:3px;background:rgba(255,255,255,.02);letter-spacing:1px}
.tbd{color:var(--muted);font-style:italic;font-weight:400}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#000;padding:9px 22px;border-radius:7px;font-weight:700;font-size:12px;transition:transform .3s;z-index:9999}
.toast.show{transform:translateX(-50%) translateY(0)}

/* KNOCKOUT EDIT PANEL for team name inputs */
.team-inp{width:140px;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:5px 6px;color:var(--text);font-size:11px}

@media(max-width:480px){.header-title{font-size:20px}.match-team{font-size:11px}.standings-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

}
function doLogout(){ isAdmin=false; document.getElementById("adminStatus").textContent="👁 View Only"; document.getElementById("adminStatus").className="admin-status off"; document.getElementById("logoutBtn").style.display="none"; renderAll(); }
document.getElementById("pinInp").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});

// ── TABS ──────────────────────────────────────────────────
function showTab(t){
  ["schedule","standings","knockout","bracket"].forEach(x=>document.getElementById("tab-"+x).style.display=x===t?"":"none");
  document.querySelectorAll(".tab").forEach((el,i)=>el.classList.toggle("active",["schedule","standings","knockout","bracket"][i]===t));
  if(t==="bracket") renderBracket();
  if(t==="standings") renderStandings();
  if(t==="knockout") renderKnockout();
}

// ── MATCH CARD ───────────────────────────────────────────
function matchCard(m){
  // Support both old t1/t2 (numeric) and new t1n/t2n (string) format
  const t1n = m.t1n || (m.slot?(m.slot.split(" vs ")[0]):"TBD");
  const t2n = m.t2n || (m.slot?(m.slot.split(" vs ")[1]):"TBD");
  const s1 = m.s1!==null&&m.s1!==undefined?m.s1:"–";
  const s2 = m.s2!==null&&m.s2!==undefined?m.s2:"–";
  const w1 = m.status==="done"&&m.s1!==null&&m.s1!==undefined&&m.s1>m.s2;
  const w2 = m.status==="done"&&m.s2!==null&&m.s2!==undefined&&m.s2>m.s1;
  const stageClass = {group:"",qf:"stage-qf",sf:"stage-sf",final:"stage-final"}[m.stage]||"";
  const statusClass = {pending:"",live:"status-live",done:"status-done"}[m.status]||"";
  const badgeClass = {group:"badge-group",qf:"badge-qf",sf:"badge-sf",final:"badge-final"}[m.stage]||"badge-3rd";
  const badgeText = {group:"Group",qf:"QF",sf:"SF",final:"FINAL"}[m.stage]||"";
  const pillClass = {pending:"pill-pending",live:"pill-live",done:"pill-done"}[m.status]||"pill-pending";
  const pillText = {pending:"Upcoming",live:"● LIVE",done:"Final"}[m.status]||"";

  const adminToggle = isAdmin ? `onclick="toggleEdit('${m.id}')" style="cursor:pointer"` : "";

  const editPanel = isAdmin ? `
  <div class="edit-panel" id="ep-${m.id}">
    <label>T1:</label>
    <input class="team-inp" id="t1n-${m.id}" type="text" value="${m.t1n||''}" placeholder="Team 1 name"/>
    <label>T2:</label>
    <input class="team-inp" id="t2n-${m.id}" type="text" value="${m.t2n||''}" placeholder="Team 2 name"/>
    <br style="width:100%">
    <label>Score:</label>
    <input class="score-inp" id="s1-${m.id}" type="number" min="0" max="99" value="${m.s1!==null&&m.s1!==undefined?m.s1:''}" placeholder="T1"/>
    <span style="color:var(--muted);font-size:13px">–</span>
    <input class="score-inp" id="s2-${m.id}" type="number" min="0" max="99" value="${m.s2!==null&&m.s2!==undefined?m.s2:''}" placeholder="T2"/>
    <select class="status-sel" id="st-${m.id}">
      <option value="pending" ${m.status==="pending"?"selected":""}>Upcoming</option>
      <option value="live" ${m.status==="live"?"selected":""}>● Live</option>
      <option value="done" ${m.status==="done"?"selected":""}>Final</option>
    </select>
    <button class="btn btn-green btn-sm" onclick="saveScore('${m.id}',event)">Save</button>
  </div>` : "";

  return `<div class="match-card ${stageClass} ${statusClass}">
    <div class="match-main" ${adminToggle}>
      <div class="match-time-label">
        <div class="match-time">${m.time||""}</div>
        <div class="match-stage-badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="match-body">
        <div class="match-teams-row">
          <div class="match-team ${w1?"winner":""}">${t1n}</div>
          <div class="match-score-box">
            <span class="score-num" style="color:${w1?"var(--accent)":"var(--text)"}">${s1}</span>
            <span class="score-dash">–</span>
            <span class="score-num" style="color:${w2?"var(--accent)":"var(--text)"}">${s2}</span>
          </div>
          <div class="match-team right ${w2?"winner":""}">${t2n}</div>
        </div>
        <div class="match-status-row">
          <span class="status-pill ${pillClass}">${pillText}</span>
          <span class="court-label">${m.court||""} ${m.label?`· ${m.label}`:""}</span>
          ${isAdmin?`<span style="font-size:9px;color:var(--accent)">▼ tap to edit</span>`:""}
        </div>
      </div>
    </div>
    ${editPanel}
  </div>`;
}

function toggleEdit(id){
  if(!isAdmin)return;
  const ep=document.getElementById("ep-"+id);
  ep&&ep.classList.toggle("open");
}
function saveScore(id,e){
  e&&e.stopPropagation();
  const m=matches.find(x=>x.id===id);
  const v1=document.getElementById("s1-"+id).value;
  const v2=document.getElementById("s2-"+id).value;
  const t1v=document.getElementById("t1n-"+id)?.value;
  const t2v=document.getElementById("t2n-"+id)?.value;
  if(t1v!==undefined) m.t1n=t1v||m.t1n;
  if(t2v!==undefined) m.t2n=t2v||m.t2n;
  m.s1=v1===""?null:parseInt(v1);
  m.s2=v2===""?null:parseInt(v2);
  m.status=document.getElementById("st-"+id).value;
  save(); renderAll(); toast("Score saved ✓");
}

// ── RENDER SCHEDULE ──────────────────────────────────────
function renderSchedule(){
  const days=[
    {key:"tue",title:"TUESDAY – Group Stage",date:"26 May 2026",timerange:"6:00 PM – 8:00 PM"},
    {key:"wed",title:"WEDNESDAY – Group Stage & Qualifiers",date:"27 May 2026",timerange:"6:00 PM – 8:00 PM"},
    {key:"thu",title:"THURSDAY – Semifinals & Final",date:"28 May 2026",timerange:"7:00 PM – 8:00 PM"},
  ];
  document.getElementById("tab-schedule").innerHTML = days.map(d=>{
    const dm = matches.filter(m=>m.day===d.key);
    const groups = dm.filter(m=>m.stage==="group");
    const kos = dm.filter(m=>m.stage!=="group");
    return `<div class="day-block">
      <div class="day-header">
        <div class="day-title">${d.title}</div>
        <div><div class="day-date">${d.date}</div><div class="day-time">${d.timerange}</div></div>
      </div>
      ${groups.map(m=>matchCard(m)).join("")}
      ${kos.length?`<div class="section-divider">— KNOCKOUTS —</div>${kos.map(m=>matchCard(m)).join("")}`:""}
    </div>`;
  }).join("");
}

// ── RENDER STANDINGS ─────────────────────────────────────
function renderStandings(){
  const groupColors={"A":"#3b8fff","B":"#00c9a7","C":"#a855f7","D":"#ff6b35"};
  const adminNote = isAdmin ? `<div style="font-size:11px;color:var(--accent);margin-bottom:10px;padding:6px 10px;background:rgba(200,230,0,.07);border-radius:6px;border:1px solid rgba(200,230,0,.2)">✏️ Admin mode: tap any team row to edit its stats</div>` : "";

  document.getElementById("tab-standings").innerHTML =
    `<div style="margin-bottom:12px"></div>${adminNote}
     <div class="standings-grid">${Object.keys(standings).map(gid=>{
       const teams=standings[gid];
       const color=groupColors[gid]||"#888";
       return `<div class="group-card">
         <div class="group-card-header" style="border-bottom:2px solid ${color}">
           <span class="group-card-name" style="color:${color}">Group ${gid}</span>
           <span style="font-size:9px;color:var(--muted)">${teams.length} teams</span>
         </div>
         <table class="standings-tbl">
           <tr><th>#</th><th>Team</th><th>MP</th><th>Pts</th><th>RR</th></tr>
           ${teams.map((t,i)=>`<tr class="${i<2?"q-row":""}" ${isAdmin?`onclick="editStandingRow('${gid}',${i})" style="cursor:pointer"`:""}">
             <td>${i+1}</td>
             <td style="font-size:10px">${t.name}</td>
             <td>${t.mp}</td>
             <td class="pts-val">${t.pts}</td>
             <td style="color:${t.rr>=0?"var(--green)":"var(--red)"};font-size:11px">${t.rr>=0?"+":""}${t.rr}</td>
           </tr>`).join("")}
         </table>
         <div id="sedit-${gid}" style="display:none;padding:8px;background:rgba(200,230,0,.04);border-top:1px solid rgba(200,230,0,.12)"></div>
       </div>`;
     }).join("")}</div>`;
}

function editStandingRow(gid, idx){
  if(!isAdmin) return;
  const container = document.getElementById(`sedit-${gid}`);
  const t = standings[gid][idx];
  container.style.display="block";
  container.innerHTML=`
    <div style="font-size:10px;color:var(--accent);margin-bottom:6px;font-weight:700">Editing: ${t.name}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">
      <label style="font-size:11px;color:var(--muted)">Team:</label>
      <input id="sname-${gid}-${idx}" style="background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:4px 6px;color:var(--text);font-size:11px;width:160px" value="${t.name}"/>
      <label style="font-size:11px;color:var(--muted)">MP:</label>
      <input id="smp-${gid}-${idx}" type="number" min="0" max="10" style="width:44px;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:4px 6px;color:var(--text);font-size:12px;text-align:center" value="${t.mp}"/>
      <label style="font-size:11px;color:var(--muted)">Pts:</label>
      <input id="spts-${gid}-${idx}" type="number" min="0" max="20" style="width:44px;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:4px 6px;color:var(--text);font-size:12px;text-align:center" value="${t.pts}"/>
      <label style="font-size:11px;color:var(--muted)">RR:</label>
      <input id="srr-${gid}-${idx}" type="number" min="-99" max="99" style="width:52px;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:4px 6px;color:var(--text);font-size:12px;text-align:center" value="${t.rr}"/>
      <button class="btn btn-green btn-sm" onclick="saveStanding('${gid}',${idx})">Save</button>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('sedit-${gid}').style.display='none'">Close</button>
    </div>`;
}

function saveStanding(gid, idx){
  standings[gid][idx].name = document.getElementById(`sname-${gid}-${idx}`).value || standings[gid][idx].name;
  standings[gid][idx].mp = parseInt(document.getElementById(`smp-${gid}-${idx}`).value)||0;
  standings[gid][idx].pts = parseInt(document.getElementById(`spts-${gid}-${idx}`).value)||0;
  standings[gid][idx].rr = parseInt(document.getElementById(`srr-${gid}-${idx}`).value)||0;
  // Re-sort by pts desc, then rr desc
  standings[gid].sort((a,b)=>b.pts-a.pts||b.rr-a.rr);
  save(); renderStandings(); toast("Standings updated ✓");
}

// ── RENDER KNOCKOUT ──────────────────────────────────────
function renderKnockout(){
  const kos = matches.filter(m=>["qf","sf","final"].includes(m.stage));
  const adminNote = isAdmin ? `<div style="font-size:11px;color:var(--accent);margin-bottom:10px;padding:6px 10px;background:rgba(200,230,0,.07);border-radius:6px;border:1px solid rgba(200,230,0,.2)">✏️ Admin mode: tap any match card to edit teams & scores</div>` : "";
  document.getElementById("tab-knockout").innerHTML =
    `<div style="margin-bottom:12px"></div>${adminNote}${kos.map(m=>matchCard(m)).join("")}`;
}

// ── RENDER BRACKET ───────────────────────────────────────
function renderBracket(){
  function bm(m,lbl){
    const t1=m.t1n||(m.slot?(m.slot.split(" vs ")[0]):"TBD");
    const t2=m.t2n||(m.slot?(m.slot.split(" vs ")[1]):"TBD");
    const w1=m.status==="done"&&m.s1!==null&&m.s1!==undefined&&m.s1>m.s2;
    const w2=m.status==="done"&&m.s2!==null&&m.s2!==undefined&&m.s2>m.s1;
    const adminClick = isAdmin ? `onclick="toggleEdit('${m.id}')" style="cursor:pointer"` : "";
    return `<div class="b-match" ${adminClick}>
      <div class="b-lbl">${lbl}${isAdmin?' ✏️':''}</div>
      <div class="b-team ${w1?"w":""}"><span class="b-team-name">${t1}</span><span class="b-score">${m.s1!==null&&m.s1!==undefined?m.s1:"–"}</span></div>
      <div class="b-team ${w2?"w":""}"><span class="b-team-name">${t2}</span><span class="b-score">${m.s2!==null&&m.s2!==undefined?m.s2:"–"}</span></div>
      ${isAdmin ? `<div id="ep-b-${m.id}" style="display:none;padding:8px;background:rgba(200,230,0,.04);border-top:1px solid rgba(200,230,0,.12)">
        <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:4px 0">
          <input class="team-inp" id="t1n-${m.id}" type="text" value="${m.t1n||''}" placeholder="Team 1"/>
          <input class="team-inp" id="t2n-${m.id}" type="text" value="${m.t2n||''}" placeholder="Team 2"/>
          <input class="score-inp" id="s1-${m.id}" type="number" min="0" max="99" value="${m.s1!==null&&m.s1!==undefined?m.s1:''}" placeholder="S1"/>
          <span style="color:var(--muted)">–</span>
          <input class="score-inp" id="s2-${m.id}" type="number" min="0" max="99" value="${m.s2!==null&&m.s2!==undefined?m.s2:''}" placeholder="S2"/>
          <select class="status-sel" id="st-${m.id}">
            <option value="pending" ${m.status==="pending"?"selected":""}>Upcoming</option>
            <option value="live" ${m.status==="live"?"selected":""}>● Live</option>
            <option value="done" ${m.status==="done"?"selected":""}>Final</option>
          </select>
          <button class="btn btn-green btn-sm" onclick="saveScore('${m.id}',event)">Save</button>
        </div>
      </div>` : ""}
    </div>`;
  }

  const qfs=matches.filter(m=>m.stage==="qf");
  const sfs=matches.filter(m=>m.stage==="sf");
  const fin=matches.find(m=>m.id==="FIN");
  const adminNote = isAdmin ? `<div style="font-size:11px;color:var(--accent);margin-bottom:10px;padding:6px 10px;background:rgba(200,230,0,.07);border-radius:6px;border:1px solid rgba(200,230,0,.2)">✏️ Admin mode: tap any bracket card to edit</div>` : "";

  document.getElementById("tab-bracket").innerHTML=`
    <div style="margin-bottom:12px"></div>${adminNote}
    <div class="bracket-outer"><div class="bracket-flex">
      <div class="bracket-col">
        <div class="bracket-col-hdr">Quarterfinals</div>
        ${qfs.map((m,i)=>bm(m,`QF ${i+1}`)).join("")}
      </div>
      <div class="bracket-col">
        <div class="bracket-col-hdr">Semifinals</div>
        <div style="margin-top:24px">${sfs.map((m,i)=>bm(m,`SF ${i+1}`)).join("")}</div>
      </div>
      <div class="bracket-col">
        <div class="bracket-col-hdr">Final</div>
        <div style="margin-top:60px">${bm(fin,"🏆 FINAL")}</div>
      </div>
    </div></div>`;
}

// Override toggleEdit to also handle bracket edit panels
const _origToggleEdit = window.toggleEdit;
function toggleEdit(id){
  if(!isAdmin)return;
  // Try schedule/knockout edit panel
  const ep=document.getElementById("ep-"+id);
  if(ep){ ep.classList.toggle("open"); return; }
  // Try bracket edit panel
  const epb=document.getElementById("ep-b-"+id);
  if(epb){ epb.style.display = epb.style.display==="none"?"block":"none"; return; }
}

// ── TOAST ────────────────────────────────────────────────
function toast(msg,err){
  const el=document.getElementById("toast");
  el.textContent=msg; el.style.background=err?"var(--red)":"var(--green)";
  el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),2200);
}

// ── RENDER ALL ───────────────────────────────────────────
function renderAll(){
  renderSchedule(); renderStandings(); renderKnockout();
  const bracket=document.getElementById("tab-bracket");
  if(bracket && bracket.style.display!=="none") renderBracket();
}

// ── AUTO REFRESH (viewers every 30s) ────────────────────
setInterval(()=>{ if(!isAdmin) renderAll(); }, 30000);

renderAll();
</script>
</body>
</html>
